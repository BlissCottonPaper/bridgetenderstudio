<!-- build:v15 — Solstice/Equinox celestial season-wilds (109-card deck); Sun now shared "replace one" for all players; steal/reclaim is the whole turn (one action/turn); Fog rests on the Mountain then to the discard when Wind clears it (never buried in deck); AI plays Fog vs a leading opponent; findSetIn avoids duplicate-identity stalls; in-game Rules link. v15.1 — header turn counter (SHOW_TURNS). v15.2 — Sun = reveal three/keep one/replace a hand card (all players); Storm shows an OK popup so it's never missed; art wired for every card type + optional Back.jpg. v15.3 — Sun drawer keeps the best of three as an upgraded draw and finishes the turn normally (may lay the completed set); non-drawer replaces. v15.4 — hand sort pills (Sort by Terrain / Direction) below your cards. v15.5 — "Fall Equinox" renamed "Autumn Equinox" to match the Autumn season + the card-art naming. v15.6 — modals float near the top with a lighter backdrop so your hand stays visible while you choose (Sun, Moon, Fog, cap). v15.7 — capping is never automatic: laying terrain onto a waiting reserve, or seasons onto an open set, asks whether to lock now or keep the seasons in reserve. v15.8 — capping redesigned: Lay Down Set only ever lays OPEN (terrain set, or a season set in reserve); a dedicated Cap Set button locks a chosen set with four seasons from hand or your reserve, always your choice. Celestial cards now show BOTH season icons (e.g. 🍃/🍁). v15.9 — CRITICAL RULE FIX: all of a player's sets must be the same kind (all direction-sets or all terrain-sets); a direction-set and a terrain-set share a card and can never coexist. Each set commits its kind at lay time so a swap can't flip a row into a column. v15.10 — title & win screens center; in-game choice popups stay up top. v15.11 — Lay Down Set no longer lights for a season set when you already have one waiting (it used to enable, then alert). v15.12 — you may now bank up to FOUR season sets at once (the one-reserve limit was a prototype artifact, never a rule). v15.13 — Sun popups now say whose Sun it is ("You drew the Sun" / "The opponent drew the Sun — it shines on you too"); confirms every player reveals three and keeps one, never a random card. v15.14 — reserve cap now counts locked sets too: waiting season sets + locked sets can never exceed four (was letting you bank a fifth). -->
<style>
  :root{
    --parchment:#e9e0cc; --ink:#3a3428; --north:#3b6ea5; --east:#c1662f;
    --south:#d4a017; --west:#6b4e8c; --neutral:#7d7566; --gold:#b8912f; --felt:#2f3a30;
    --cardW:104px; --cardH:150px;   /* tune these two to resize every card at once */
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;background:var(--felt);
    color:#f2ecdc;min-height:100vh;}
  header{padding:10px 18px;background:linear-gradient(#20281f,#2f3a30);
    border-bottom:2px solid var(--gold);display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  header h1{margin:0;font-size:22px;letter-spacing:2px;color:var(--parchment);}
  header .tag{font-style:italic;color:#b9b09a;font-size:13px;}
  header .turnc{font-size:12px;color:#241d0c;background:var(--gold);font-weight:bold;
    padding:2px 10px;border-radius:10px;margin-left:14px;letter-spacing:.5px;}
  header .score{margin-left:auto;font-size:15px;color:var(--parchment);}
  header .score b{color:var(--gold);}
  header .ruleslink{color:var(--gold);text-decoration:none;font-size:13px;border:1px solid var(--gold);
    padding:3px 10px;border-radius:6px;margin-left:14px;white-space:nowrap;}
  header .ruleslink:hover{background:#4a3f26;}
  #log{background:#1c231c;border-top:1px solid #3d4a3d;font-size:12.5px;
    max-height:74px;overflow-y:auto;padding:6px 18px;color:#c9c2ae;}
  #log div{padding:1px 0;}
  .board{padding:12px 18px 130px;max-width:1240px;margin:0 auto;}
  .zone{margin-bottom:16px;}
  .zone h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;text-align:center;
    color:#a89f88;margin:0 0 8px;border-bottom:1px solid #46523f;padding-bottom:4px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;justify-content:center;}
  .set{border:1px dashed #5a6650;border-radius:8px;padding:6px;background:#28312a;}
  .set.locked{border:2px solid var(--gold);background:#33301f;}
  .set.reserve{border:1px dashed #8a7a4a;background:#302c1f;}
  .set .setlabel{font-size:11px;color:#9aa88e;margin-bottom:4px;}
  .set.locked .setlabel{color:var(--gold);}
  .set .cards{display:flex;gap:4px;flex-wrap:wrap;}
  /* A locked (capped) set is "closed" — its cards stack into a compact overlapping fan,
     colored tops peeking, seasons sealed on top. Much smaller footprint. */
  .set.locked .cards{gap:0;}
  .set.locked .cards .card{margin-left:-32px;box-shadow:-3px 0 6px #0007;}
  .set.locked .cards .card:first-child{margin-left:0;}
  .set.locked:hover .cards .card{margin-left:2px;} /* hover a closed set to fan it back open */
  .set.locked:hover .cards .card:first-child{margin-left:0;}
  /* Every dimension inside a card is a fraction of --cardH, so overriding
     --cardW/--cardH (e.g. on .mini) rescales the whole card automatically. */
  .card{width:var(--cardW);height:var(--cardH);border-radius:8px;background:#d8cdb4;color:#2a2418;
    position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.4);
    flex:0 0 auto;border:1px solid #00000030;user-select:none;transition:transform .1s,box-shadow .1s;}
  .card.mini{--cardW:62px;--cardH:90px;}
  #pHand .card{--cardW:122px;--cardH:176px;} /* your hand cards sit a little larger */
  .card.sel{outline:3px solid var(--gold);transform:translateY(-8px);}
  .card.hint{box-shadow:0 0 0 2px var(--gold),0 0 14px 3px #d4a01799;}
  .card.stealable{box-shadow:0 0 0 2px #4f8c4a,0 0 14px 3px #4f8c4a99;}
  .card.playable{cursor:pointer;}
  .card.playable:hover{transform:translateY(-6px);}
  .card .top{height:calc(var(--cardH)*0.19);display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--cardH)*0.092);font-weight:bold;color:#fff;text-shadow:0 1px 1px #0006;letter-spacing:.5px;}
  .card .body{position:absolute;top:calc(var(--cardH)*0.19);bottom:calc(var(--cardH)*0.12);left:0;right:0;
    display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:2px;}
  .card .icon{font-size:calc(var(--cardH)*0.235);line-height:1;}
  .card .name{font-size:calc(var(--cardH)*0.092);margin-top:3px;font-weight:bold;}
  .card .foot{position:absolute;bottom:0;left:0;right:0;height:calc(var(--cardH)*0.12);line-height:calc(var(--cardH)*0.12);
    font-size:calc(var(--cardH)*0.068);text-align:center;color:#fff;background:#0003;}
  .card.back{background:var(--parchment);}
  .card.back .enso{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:calc(var(--cardH)*0.24);color:#5a4e33;}
  .card.fogged::after{content:'FOG';position:absolute;inset:0;background:#c9d3dd99;
    display:flex;align-items:center;justify-content:center;font-weight:bold;color:#33475a;font-size:calc(var(--cardH)*0.09);letter-spacing:2px;}
  .pile{width:var(--cardW);height:var(--cardH);border-radius:8px;border:2px dashed #5a6650;
    display:flex;align-items:center;justify-content:center;text-align:center;
    font-size:12px;color:#9aa88e;cursor:pointer;background:#28312a;}
  .pile:hover{border-color:var(--gold);color:var(--gold);}
  #controls{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(#20281f,#2f3a30);
    border-top:2px solid var(--gold);padding:8px 18px;display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
  button{font-family:inherit;font-size:13px;padding:7px 12px;border-radius:6px;
    border:1px solid var(--gold);background:#3a3120;color:var(--parchment);cursor:pointer;}
  button:hover:not(:disabled){background:#4a3f26;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.primary{background:var(--gold);color:#241d0c;font-weight:bold;}
  #hint{font-style:italic;color:#cfc7b0;font-size:13px;margin-left:6px;}
  .piles{display:flex;gap:14px;align-items:flex-start;justify-content:center;}
  .pilewrap{text-align:center;font-size:11px;color:#9aa88e;}
  /* Modals float near the TOP (with a lighter backdrop) so your hand stays readable underneath —
     you can weigh the Sun's three offerings against the cards you're already holding. */
  #overlay{position:fixed;inset:0;background:#00000059;display:none;align-items:flex-start;justify-content:center;
    padding-top:26px;z-index:50;overflow-y:auto;}
  #overlay.center{align-items:center;padding-top:0;} /* title & win screens sit centered; in-game choice popups stay up top */
  #overlay .modal{background:var(--parchment);color:var(--ink);border-radius:12px;
    padding:24px 28px;max-width:560px;text-align:center;box-shadow:0 8px 30px #000;}
  #overlay .modal h2{margin-top:0;color:#5a4a22;}
  #overlay .modal .picks{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
  .badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:9px;background:#00000030;margin-left:6px;}
  .sortrow{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;}
  .sortrow .sortlabel{font-size:11px;color:#a89f88;text-transform:uppercase;letter-spacing:1.5px;margin-right:2px;}
  .pill{font-family:inherit;font-size:12.5px;padding:5px 18px;border-radius:16px;border:1px solid var(--gold);
    background:transparent;color:var(--parchment);cursor:pointer;transition:background .1s;}
  .pill:hover{background:#4a3f26;}
  .pill.active{background:var(--gold);color:#241d0c;font-weight:bold;}
</style>

<body>
<header>
  <h1>HARMONY</h1><span class="tag">A Game of Balance</span><span class="turnc" id="turnCount" style="display:none;">Turn 1</span>
  <span class="score">You <b id="pScore">0</b> / <span id="target">4</span> &nbsp;·&nbsp;
    Opponent <b id="aScore">0</b> / <span id="target2">4</span></span>
  <a href="rules.html" target="harmonyRules" class="ruleslink"
     onclick="window.open('rules.html','harmonyRules','width=880,height=940,scrollbars=yes,resizable=yes');return false;">📖 Rules</a>
</header>
<div id="log"></div>

<div class="board">
  <div class="zone"><h2>Opponent</h2>
    <div class="row" id="aHand"></div>
    <div class="row" id="aSets" style="margin-top:8px;"></div>
  </div>
  <div class="zone"><h2>Table</h2>
    <div class="piles">
      <div class="pilewrap"><div class="pile" id="drawPile" onclick="drawFrom('draw')"></div>Draw</div>
      <div class="pilewrap"><div class="pile" id="discardPile" onclick="drawFrom('discard')"></div>Discard</div>
    </div>
  </div>
  <div class="zone"><h2>Your Sets</h2>
    <div class="row" id="pSets"></div>
  </div>
  <div class="zone"><h2>Your Hand <span id="handCount" class="badge"></span></h2>
    <div class="row" id="pHand"></div>
    <div class="sortrow">
      <span class="sortlabel">Sort by</span>
      <button class="pill" id="sortTerrain" onclick="setSort('terrain')">Terrain</button>
      <button class="pill" id="sortDirection" onclick="setSort('direction')">Direction</button>
    </div>
  </div>
</div>

<div id="controls">
  <button id="btnLay" class="primary" onclick="layDownSet()" disabled>Lay Down Set</button>
  <button id="btnCap" onclick="capSet()" disabled>Cap Set</button>
  <button id="btnSteal" onclick="stealMountain()" disabled>Steal Mountain</button>
  <button id="btnSpecial" onclick="playSpecial()" disabled>Play Special</button>
  <button id="btnDiscard" onclick="discardSelected()" disabled>Discard &amp; End Turn</button>
  <button onclick="clearSel()">Clear Selection</button>
  <button onclick="newGame()">New Game</button>
  <span id="hint"></span>
</div>

<div id="overlay"><div class="modal" id="modal"></div></div>

<script>
/* ============================================================
   HARMONY — playable prototype (single player vs. a simple AI)
   Cards are words+emoji for now. To use real art: drop images into an art/ folder
   (Title_Case names — see artFile()) and set USE_ART=true.
   ============================================================ */
const ART_BASE="art/"; const USE_ART=false;
/* When USE_ART is on, each card shows the image art/<Name>.jpg full-bleed (art IS the card face).
   File names are Title_Case with underscores — see artFile() for the exact name of every card.
   Optional card back: art/Back.jpg. */
function artFile(c){
  if(!c)return null;
  if(c.kind==="terrain")return c.direction+"_"+c.terrain;      // e.g. North_River
  if(c.celestial)return c.celestial.replace(/ /g,"_");          // e.g. Summer_Solstice
  if(c.kind==="season")return c.season;                        // e.g. Autumn
  if(c.special)return c.special;                               // e.g. Mountain, Fog, Wind, Storm, Sun, Moon
  return null;
}
/* Card glow (gold = layable set, green = completable Mountain) is a training aid for the
   solo teaser. In real 1-on-1 human play it must be OFF — no coaching your opponent's eye.
   Flip to false for the head-to-head build. */
const SHOW_HINTS=true;
/* Testing aid — a running turn counter in the header (counts every turn, yours and the opponent's).
   Flip to false for the public build. */
const SHOW_TURNS=true;
const TERRAINS=["Forest","Field","River","Road"];
const DIRECTIONS=["North","East","South","West"];
const SEASONS=["Spring","Summer","Autumn","Winter"];
const DIRCOLOR={North:"var(--north)",East:"var(--east)",South:"var(--south)",West:"var(--west)"};
const TERRAINICON={Forest:"🌳",Field:"🌾",River:"🌊",Road:"🛤️"};
const SEASONICON={Spring:"🌸",Summer:"🍃",Autumn:"🍁",Winter:"❄️"};
const SEASONCOLOR={Spring:"#c46b8b",Summer:"#4f8c4a",Autumn:"#c1662f",Winter:"#5a7fa5"};
const SPECIAL={Mountain:"⛰️",Fog:"🌫️",Wind:"🍃",Storm:"⚡",Sun:"☀️",Moon:"🌙"};
/* Celestial season-wilds — each plays as ONE of two adjacent seasons (either/or, never both),
   one of each in the deck. They mark the turning points between seasons. */
const CELESTIAL={
  "Spring Equinox":{seasons:["Winter","Spring"],icon:"🌷"},
  "Summer Solstice":{seasons:["Spring","Summer"],icon:"🌞"},
  "Autumn Equinox":{seasons:["Summer","Autumn"],icon:"🍁"},
  "Winter Solstice":{seasons:["Autumn","Winter"],icon:"⛄"},
};
/* ---- Hand sorting (a viewing aid; never changes what you hold) ----
   Groups: terrains → seasons → celestials → the rest (Mountain, Fog, …).
   Sort by Terrain orders terrains Field·Forest·River·Road; Sort by Direction orders them N·E·S·W. */
let SORTMODE=null; // null = draw order; "terrain" or "direction"
const TERRAIN_ORDER={Field:0,Forest:1,River:2,Road:3};
const DIR_ORDER={North:0,East:1,South:2,West:3};
const SEASON_ORDER={Spring:0,Summer:1,Autumn:2,Winter:3};
const CELESTIAL_ORDER={"Spring Equinox":0,"Summer Solstice":1,"Autumn Equinox":2,"Winter Solstice":3};
const SPECIAL_ORDER={Mountain:0,Fog:1,Wind:2,Storm:3,Sun:4,Moon:5};
function sortKey(c,mode){
  if(c.kind==="terrain"){const t=TERRAIN_ORDER[c.terrain]??9,d=DIR_ORDER[c.direction]??9;
    return mode==="direction"?[0,d,t]:[0,t,d];}
  if(c.celestial)return [2,CELESTIAL_ORDER[c.celestial]??9,0];
  if(c.kind==="season")return [1,SEASON_ORDER[c.season]??9,0];
  return [3,SPECIAL_ORDER[c.special]??9,0];
}
function cmpSort(a,b,mode){const ka=sortKey(a,mode),kb=sortKey(b,mode);
  for(let i=0;i<3;i++){const x=ka[i]??0,y=kb[i]??0;if(x!==y)return x-y;}return 0;}
function setSort(mode){SORTMODE=(SORTMODE===mode)?null:mode;render();} // click active pill again to return to draw order
const TARGET=4;
let uid=0;
function card(p){return Object.assign({id:++uid,fog:false},p);}
function buildDeck(){const d=[];
  for(const t of TERRAINS)for(const dir of DIRECTIONS)for(let i=0;i<3;i++)d.push(card({kind:"terrain",terrain:t,direction:dir}));
  for(const s of SEASONS)for(let i=0;i<10;i++)d.push(card({kind:"season",season:s}));
  for(const name of Object.keys(CELESTIAL))d.push(card({kind:"season",celestial:name})); // one Spring Equinox, Summer Solstice, Fall Equinox, Winter Solstice
  for(let i=0;i<6;i++)d.push(card({kind:"special",special:"Mountain"}));
  for(let i=0;i<4;i++)d.push(card({kind:"special",special:"Fog"}));
  for(let i=0;i<4;i++)d.push(card({kind:"special",special:"Wind"}));
  d.push(card({kind:"special",special:"Storm"})); // one sky, one storm
  d.push(card({kind:"special",special:"Sun"}));   // it is either day…
  d.push(card({kind:"special",special:"Moon"}));  // …or night — never twice
  return d;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let G;
function newGame(){
  const deck=shuffle(buildDeck());
  G={draw:deck,discard:[],player:{hand:[],sets:[],reserves:[]},ai:{hand:[],sets:[],reserves:[]},
     turn:"player",drewThisTurn:false,sel:new Set(),over:false,msg:[],eventQueue:[],eventSpent:[],eventNext:null,turnCount:1};
  STORM_ACTIVE=false;
  for(let i=0;i<7;i++){G.player.hand.push(G.draw.pop());G.ai.hand.push(G.draw.pop());}
  logMsg("A new game begins. Draw a card to start your turn.");
  /* A table event dealt into an opening hand still fires immediately, in sky-priority.
     Pull any out of both hands, top the hands back up, then resolve. */
  const dealt=[];
  [G.player,G.ai].forEach(w=>{for(let i=w.hand.length-1;i>=0;i--){if(isImmediate(w.hand[i]))dealt.push(w.hand.splice(i,1)[0]);}});
  const startDiscard=()=>{
    let idx=G.draw.length-1;while(idx>=0&&isImmediate(G.draw[idx]))idx--; // top discard is an ordinary card
    if(idx>=0)G.discard.push(G.draw.splice(idx,1)[0]);
    render();
  };
  if(dealt.length){G.eventQueue.push(...dealt);drawUpTo(G.player);drawUpTo(G.ai);render();flushEvents(startDiscard);}
  else startDiscard();
}
function logMsg(m){G.msg.unshift(m);if(G.msg.length>40)G.msg.pop();
  document.getElementById("log").innerHTML=G.msg.map(x=>"<div>"+x+"</div>").join("");}
function cardName(c){if(c.kind==="terrain")return c.direction+" "+c.terrain;if(c.celestial)return c.celestial;if(c.kind==="season")return c.season;return c.special;}
/* The seasons a season-card can stand for: a normal season is itself; a celestial card is either of its two. */
function seasonOptions(c){return c.celestial?CELESTIAL[c.celestial].seasons.slice():(c.season?[c.season]:[]);}
/* Can these four season-family cards be assigned to the four distinct seasons (Spring/Summer/Autumn/Winter)?
   Celestial cards flex to either of their two seasons — solved as a small 4x4 assignment. */
function seasonsCover(cards){
  if(cards.length!==4||!cards.every(c=>c.kind==="season"))return false;
  const opts=cards.map(seasonOptions),used=new Array(4).fill(false);
  function rec(ti){if(ti===SEASONS.length)return true;
    for(let i=0;i<4;i++){if(!used[i]&&opts[i].includes(SEASONS[ti])){used[i]=true;if(rec(ti+1))return true;used[i]=false;}}
    return false;}
  return rec(0);
}
/* Find four season cards in a hand that together cap a set (cover all four seasons), or null. */
function findSeasonCap(hand){
  const seas=hand.filter(c=>c.kind==="season");if(seas.length<4)return null;
  const combos=[];
  (function choose(start,acc){if(acc.length===4){combos.push(acc.slice());return;}
    for(let i=start;i<seas.length;i++){acc.push(seas[i]);choose(i+1,acc);acc.pop();}})(0,[]);
  for(const c of combos)if(seasonsCover(c))return c;
  return null;
}

/* ---------- SET LOGIC ---------- */
function evaluateSet(cards){
  if(cards.length!==4)return{ok:false};
  const reals=cards.filter(c=>c.kind==="terrain");
  const wilds=cards.filter(c=>c.special==="Mountain").length;
  if(reals.length<1)return{ok:false};            // a set needs at least one real terrain to define it — no all-wild sets
  if(reals.length+wilds!==4)return{ok:false};
  const dirs=new Set(reals.map(c=>c.direction)),ters=new Set(reals.map(c=>c.terrain));
  if(dirs.size<=1 && ters.size===reals.length){const dir=[...dirs][0]||"Wild";return{ok:true,label:dir+" — all terrains",type:"direction"};}
  if(ters.size<=1 && dirs.size===reals.length){const ter=[...ters][0]||"Wild";return{ok:true,label:ter+" — all directions",type:"terrain"};}
  return{ok:false};
}
function distinctSeasons(cards){return seasonsCover(cards);} // celestial-aware: four season cards that cover all four seasons
function setFogged(s){return s.cards.some(c=>c.fog);}
/* Each laid set has a unique identity — a direction (all four terrains of one direction)
   or a terrain (all four directions of one terrain). You can't lay the same one twice,
   and you build toward at most four sets. */
function setIdentity(cards){
  const reals=cards.filter(c=>c.kind==="terrain");if(!reals.length)return null;
  const dirs=new Set(reals.map(c=>c.direction)),ters=new Set(reals.map(c=>c.terrain));
  if(ters.size===1 && dirs.size===reals.length && dirs.size>1)return "ter:"+[...ters][0];
  return "dir:"+[...dirs][0]; // default (incl. single-real/wild-heavy sets) classifies by direction
}
function canAddSet(who,terrCards){
  if(who.sets.length>=4)return {ok:false,msg:"You can only build four sets — that's the whole path."};
  const id=setIdentity(terrCards);
  if(id!==null && who.sets.some(s=>setIdentity(s.cards)===id))return {ok:false,msg:"You already have that set laid down — each direction and each terrain set is unique."};
  /* All of a player's sets must be the SAME KIND — every set a full direction (row) OR every set a
     full terrain (column). A direction-set and a terrain-set always cross at one shared card (e.g. a
     "Road, all directions" set and an "East, all terrains" set both need East Road), so they can never
     both be laid. A legal win is 16 DISTINCT cards: the four rows, or the four columns. */
  const newType=evaluateSet(terrCards).type;
  const existingType=who.sets.map(s=>s.kind||evaluateSet(s.cards).type).find(Boolean);
  if(existingType&&newType&&newType!==existingType)
    return {ok:false,msg:"Your sets must all be the same kind — either every set a single direction (all four terrains), or every set a single terrain (all four directions). A direction-set and a terrain-set would both need the very same card, so they can't both exist. Build four of one kind."};
  return {ok:true};
}
/* Find a four-card terrain set the owner can actually ADD (not one whose identity is already
   laid). Prefers sets that use the fewest Mountains so wilds aren't wasted. `owner` optional —
   when given, already-laid identities are skipped so a player is never stuck re-forming a set
   they've already played. */
function findSetIn(hand,owner){
  const existing=owner?owner.sets.map(s=>setIdentity(s.cards)):[];
  const terr=hand.filter(c=>c.kind==="terrain"),mts=hand.filter(c=>c.special==="Mountain");
  const cands=[];
  for(const dir of DIRECTIONS){const inDir=terr.filter(c=>c.direction===dir);const byT={};inDir.forEach(c=>byT[c.terrain]=byT[c.terrain]||c);
    const d=Object.values(byT),miss=4-d.length;if(d.length>=1&&miss>=0&&miss<=mts.length)cands.push([...d,...mts.slice(0,miss)]);}
  for(const ter of TERRAINS){const inTer=terr.filter(c=>c.terrain===ter);const byD={};inTer.forEach(c=>byD[c.direction]=byD[c.direction]||c);
    const d=Object.values(byD),miss=4-d.length;if(d.length>=1&&miss>=0&&miss<=mts.length)cands.push([...d,...mts.slice(0,miss)]);}
  cands.sort((a,b)=>a.filter(c=>c.special==="Mountain").length-b.filter(c=>c.special==="Mountain").length); // fewest wilds first
  for(const c of cands){
    if(owner){if(canAddSet(owner,c).ok)return c;}          // respect uniqueness AND the same-kind rule
    else{const id=setIdentity(c);if(!existing.includes(id))return c;}
  }
  return null;
}
function hintIds(hand){
  const ids=new Set();
  const cap=findSeasonCap(hand);if(cap)cap.forEach(c=>ids.add(c.id)); // glow a four-season cap (celestial cards count)
  const f=findSetIn(hand,G.player);if(f&&canAddSet(G.player,f).ok)f.forEach(c=>ids.add(c.id)); // glow only a set you can actually add (dup / already 4)
  return ids;
}
function mountainNeeds(s,tc){
  // Can your terrain card tc fill a Mountain's slot in set s — WITHOUT changing the set's committed kind?
  const reals=s.cards.filter(c=>c.kind==="terrain");
  if(!reals.length||tc.kind!=="terrain")return false;
  const dirs=new Set(reals.map(c=>c.direction)),ters=new Set(reals.map(c=>c.terrain));
  const kind=s.kind||evaluateSet(s.cards).type; // a set keeps its kind for life — a swap can never flip a row (direction) into a column (terrain)
  if(kind==="direction") return dirs.size===1 && tc.direction===[...dirs][0] && !ters.has(tc.terrain); // fill a missing terrain of that direction
  return ters.size===1 && tc.terrain===[...ters][0] && !dirs.has(tc.direction);                        // fill a missing direction of that terrain
}
/* A terrain card can fill a Mountain slot in ANY unlocked, unfogged set — the
   opponent's (a steal) OR your own (reclaim your wild by completing with the real card). */
function swapTargets(tc){
  if(!tc||tc.kind!=="terrain")return [];
  const cand=[...G.player.sets.map(s=>({s,mine:true})),...G.ai.sets.map(s=>({s,mine:false}))];
  return cand.filter(o=>!o.s.locked && o.s.cards.some(c=>c.special==="Mountain"&&!c.fog) && mountainNeeds(o.s,tc));
}
function stealableTargets(tc){return swapTargets(tc);} // back-compat alias

/* ---------- RENDER ---------- */

    <div class="foot" style="background:${color}">${foot}</div>`;

function setEl(set){

/* ---------- SELECTION / CONTROLS ---------- */
function toggleSel(id){if(G.sel.has(id))G.sel.delete(id);else G.sel.add(id);render();}
function clearSel(){G.sel.clear();render();}
function selCards(){return G.player.hand.filter(c=>G.sel.has(c.id));}
function updateControls(){
  const my=G.turn==="player"&&!G.over&&G.drewThisTurn;
  const sel=selCards();
  const terr=sel.filter(c=>c.kind==="terrain"||c.special==="Mountain");
  const seas=sel.filter(c=>c.kind==="season");
  const laysTerrain=terr.length===4&&seas.length===0&&evaluateSet(terr).ok&&canAddSet(G.player,terr).ok;
  const capsLeft=4-G.player.sets.filter(s=>s.locked).length; // you can only ever lock four sets; each locked set already used a season set
  const laysSeason =seas.length===4&&terr.length===0&&distinctSeasons(seas)&&G.player.reserves.length<capsLeft; // bank only as many season sets as you have sets left to lock
  document.getElementById("btnLay").disabled=!(my&&(laysTerrain||laysSeason)); // Lay Down Set only ever lays OPEN (terrain set, or a season set in reserve)
  // Cap Set: a deliberate lock, using four seasons selected in hand, or (nothing selected) your waiting reserve.
  const hasOpenSet=G.player.sets.some(s=>!s.locked&&!setFogged(s));
  const capFromHand=sel.length===4&&seas.length===4&&distinctSeasons(seas);
  const capFromReserve=G.player.reserves.length>0&&sel.length===0;
  document.getElementById("btnCap").disabled=!(my&&hasOpenSet&&(capFromHand||capFromReserve));
  // Steal/reclaim is a whole turn taken INSTEAD of drawing — so it's offered only before you've drawn.
  const preDraw=G.turn==="player"&&!G.over&&!G.drewThisTurn;
  const swaps=sel.length===1&&sel[0].kind==="terrain"?swapTargets(sel[0]):[];
  const canSteal=swaps.length>0;
  const btnSteal=document.getElementById("btnSteal");
  btnSteal.disabled=!(preDraw&&canSteal);
  if(preDraw&&canSteal){const anyMine=swaps.some(o=>o.mine),anyOpp=swaps.some(o=>!o.mine);
    btnSteal.textContent=anyOpp&&!anyMine?"Steal Mountain":anyMine&&!anyOpp?"Reclaim Mountain":"Swap Mountain";}
  else btnSteal.textContent="Steal Mountain";
  // Fog only if there's an unfogged Mountain in some unlocked set to freeze; Wind only if your own Mountain is fogged.
  let oneSpecial=false;
  if(sel.length===1){const sp=sel[0].special;
    if(sp==="Fog")oneSpecial=[...G.player.sets,...G.ai.sets].some(s=>!s.locked&&s.cards.some(c=>c.special==="Mountain"&&!c.fog));
    else if(sp==="Wind")oneSpecial=G.player.sets.some(s=>s.cards.some(c=>c.fog));}
  document.getElementById("btnSpecial").disabled=!(my&&oneSpecial);
  document.getElementById("btnDiscard").disabled=!(my&&sel.length===1);
  const hint=document.getElementById("hint");
  if(G.over)hint.textContent="";
  else if(G.turn!=="player")hint.textContent="Opponent is thinking…";
  else if(!G.drewThisTurn)hint.textContent="Draw a card to begin your turn — or, instead, select a terrain card and Steal a Mountain to spend your whole turn on the swap.";
  else hint.textContent="Gold-glowing cards form a set you can lay · green = can complete a Mountain set (steal the opponent's, or reclaim your own). Select, act — or discard one to end your turn.";
}
/* ---------- DRAW ---------- */
function drawFrom(pile){
  if(G.over||G.turn!=="player"||G.drewThisTurn)return;
  if(pile==="draw"){const c=popDeck();if(!c)return;
    if(c.special==="Sun"){return playerSunDraw(c);} // Sun: keep the best of three, then finish your turn (may lay a set)
    if(isImmediate(c)){G.drewThisTurn=true;logMsg("You drew the "+c.special+"…");G.eventQueue.push(c);
      // Drawing a sky event IS your turn — it resolves and the turn ends (no extra discard).
      return flushEvents(()=>{render();if(checkWin())return;endTurn();});}
    G.player.hand.push(c);logMsg("You drew from the deck.");}
  else{if(!G.discard.length)return;
    if(isImmediate(G.discard[G.discard.length-1])){document.getElementById("hint").textContent="That spent sky card can't be taken — draw from the deck instead.";return;}
    const c=G.discard.pop();G.player.hand.push(c);logMsg("You took the "+cardName(c)+" from the discard.");}
  G.drewThisTurn=true;render();
}
function reshuffle(){if(!G.discard.length)return;const keep=G.discard.pop();G.draw=shuffle(G.discard);G.discard=[keep];logMsg("(The draw pile was refilled from the discards.)");}
function popDeck(){if(!G.draw.length)reshuffle();if(!G.draw.length)return null;return G.draw.pop();}
/* ============================================================
   TABLE EVENTS — Storm, Sun, Moon are never held or played.
   The instant one is drawn from the deck it takes the whole table:
     ⚡ Storm — everyone throws down their hand and draws seven anew
     ☀️ Sun   — for everyone: reveal three, keep one; the drawer keeps it as an upgraded draw and finishes their turn (may lay a set), others replace a card (net zero)
     🌙 Moon  — each player may release up to three and draw as many
   You make hay while the sun shines; you don't hoard it.
   ============================================================ */
function isImmediate(c){return c&&c.kind==="special"&&(c.special==="Storm"||c.special==="Sun"||c.special==="Moon");}
/* A sky event announces itself front-and-center with an OK gate, so a player who glanced away
   still sees that it fired (a Storm shouldn't silently empty your hand). */
function announceModal(html,onOk){
  const m=document.getElementById("modal");
  m.innerHTML=html+"<div style='margin-top:16px;'><button class='primary' onclick='closeAnnounce()'>OK</button></div>";
  G.announceOk=onOk;showOverlay();
}
function closeAnnounce(){hideOverlay();const f=G.announceOk;G.announceOk=null;if(f)f();}
let STORM_ACTIVE=false;
function handleDrawnStorm(stormCard,resume){
  STORM_ACTIVE=true;
  G.discard.push(...G.player.hand,...G.ai.hand);
  G.eventSpent.push(stormCard);           // held aside so it can't recycle mid-chain
  G.player.hand=[];G.ai.hand=[];
  logMsg("⚡ STORM! The card is drawn and the sky breaks — every player throws down their whole hand and draws seven fresh.");
  drawUpTo(G.player);drawUpTo(G.ai);
  STORM_ACTIVE=false;
  render();
  announceModal("<h2 style='font-size:32px;letter-spacing:4px;margin:0;'>⚡ STORM!</h2><p style='max-width:420px;margin:12px auto;font-size:14.5px;'>The sky breaks — <b>every player throws down their whole hand and draws seven fresh</b>. Your laid sets are untouched.</p>", resume||function(){});
}
function drawUpTo(who){
  while(who.hand.length<7){
    const c=popDeck();if(!c)break;
    if(c.special==="Storm"&&STORM_ACTIVE){G.discard.push(c);continue;} // spent during this same storm — set aside
    if(isImmediate(c)){G.eventQueue.push(c);continue;}                 // Storm/Sun/Moon resolve after this batch
    who.hand.push(c);
  }
}
function removeFromHand(who,cards){const ids=new Set(cards.map(c=>c.id));who.hand=who.hand.filter(c=>!ids.has(c.id));}

/* Resolve queued table events in strict sky-priority, one at a time (each may pause
   for the player's choice), then run `done` to resume whatever was interrupted.
   Priority: ⚡ Storm first — its clouds blot out any Sun/Moon in the same moment;
   then ☀️ Sun (the brighter light); then 🌙 Moon. */
function retireEvents(cards){ // spent sky cards leave to the BOTTOM of the deck — never face-up anywhere; may come round again on a later pass
  if(cards.length)G.draw.unshift(...cards);
}
function flushEvents(done){
  if(G.over||!G.eventQueue.length){
    G.eventQueue.length=0;
    if(G.eventSpent.length){retireEvents(G.eventSpent);G.eventSpent=[];} // chain settled — spent events leave to the deck bottom
    if(done)done();return;
  }
  const stormIdx=G.eventQueue.findIndex(c=>c.special==="Storm");
  if(stormIdx>=0){
    const storm=G.eventQueue[stormIdx];
    const clouded=G.eventQueue.filter(c=>c!==storm); // Sun/Moon caught in the same moment are clouded out
    if(clouded.length){G.eventSpent.push(...clouded);logMsg("⚡ The storm clouds blot out the "+clouded.map(c=>c.special).join(" and the ")+" — only the tempest is felt.");}
    G.eventQueue.length=0;
    handleDrawnStorm(storm,()=>flushEvents(done)); // resets both hands, then waits for OK; its redraw may surface fresh events, resolved after
    return;
  }
  G.eventQueue.sort((a,b)=>(a.special==="Sun"?0:1)-(b.special==="Sun"?0:1)); // Sun before Moon
  const c=G.eventQueue.shift();
  G.eventNext=()=>flushEvents(done);
  if(c.special==="Sun")sunEvent(c);
  else if(c.special==="Moon")moonEvent(c);
  else{const n=G.eventNext;G.eventNext=null;if(n)n();}
}
function eventDeckDraw(){ // draw one for an event's own needs; immediates re-queue rather than nest
  const c=popDeck();if(!c)return null;
  if(isImmediate(c)){G.eventQueue.push(c);return null;}
  return c;
}
/* ☀️ Sun = a sky event for EVERYONE, like Storm and Moon. Reveal three, keep the best,
   discard the other two. For the DRAWER the kept card is simply an upgraded draw: you're
   then holding eight and finish your turn as normal — discard one, OR lay a set if the kept
   card completed one (laying is your discard, then you refill to seven). For the NON-drawer
   (it isn't their turn) the kept card REPLACES one card of their choice, netting zero. The
   Sun melts to the bottom of the deck. */
function sunReveal(n){ // reveal n ordinary cards; sky cards among them slide to the deck bottom
  const out=[],aside=[];let g=0;
  while(out.length<n&&g++<200){const c=popDeck();if(!c)break;if(isImmediate(c)){aside.push(c);continue;}out.push(c);}
  if(aside.length)G.draw.unshift(...aside);return out;
}
function sunReplaceAI(){ // opponent (not their turn): reveal three, keep best, discard the rest and its worst hand card
  const d=sunReveal(3);if(!d.length)return;
  const keep=aiBest(d);d.filter(x=>x!==keep).forEach(x=>G.discard.push(x));G.ai.hand.push(keep);
  const w=aiWorst(G.ai.hand,1)[0];if(w){removeFromHand(G.ai,[w]);G.discard.push(w);}
}
function sunKeepModalGeneric(pDrawn,onKept,intro){ // pick one of three to keep (the other two are discarded); does NOT hide the overlay
  const m=document.getElementById("modal");
  m.innerHTML="<h2>☀️ Sun — keep one of three</h2><p style='max-width:450px;margin:8px auto;font-size:13px;'>"+(intro?"<b>"+intro+"</b> ":"")+"The Sun shows you three cards. Keep the best; the other two are discarded.</p><div class='picks' id='sp'></div>";
  pDrawn.forEach(cd=>{const e=cardEl(cd,{});e.style.cursor="pointer";e.onclick=()=>{
    pDrawn.filter(x=>x.id!==cd.id).forEach(x=>G.discard.push(x));
    G.player.hand.push(cd);logMsg("☀️ You kept the "+cardName(cd)+" from the sun.");
    render();onKept(cd);};
    m.querySelector("#sp").appendChild(e);});
  showOverlay();
}
function sunReleaseModalGeneric(onDone){ // non-drawer replace: release one from hand to return to seven
  const m=document.getElementById("modal");
  m.innerHTML="<h2>☀️ Sun — replace which card?</h2><p style='max-width:450px;margin:8px auto;font-size:13px;'>The Sun caught you mid-round — release one card so the kept card replaces it and your hand stays at seven.</p><div class='picks' id='sp' style='flex-wrap:wrap;'></div>";
  G.player.hand.forEach(cd=>{const e=cardEl(cd,{mini:true});e.style.cursor="pointer";e.onclick=()=>{

function sunPlayerContinue(){ // drawer is now holding eight — finish the turn normally (lay a set, or discard one)
  if(checkWin())return;render();

// The player draws the Sun on their turn: opponent replaces, you keep the best of three, then finish your turn.
function playerSunDraw(sun){
  G.drewThisTurn=true;G.draw.unshift(sun); // Sun melts to the deck bottom
  sunReplaceAI();
  const pDrawn=sunReveal(3);
  logMsg("☀️ The Sun rises for all — keep the best of three, then finish your turn.");
  if(!pDrawn.length){if(checkWin())return;render();return endTurn();} // deck spent: nothing to keep, turn ends at seven
  sunKeepModalGeneric(pDrawn,()=>{hideOverlay();sunPlayerContinue();},"You drew the Sun.");
}
// The AI draws the Sun on its turn: AI keeps the best of three (now eight) and finishes via aiPlay; you (not your turn) replace one.
function aiSunDraw(sun){
  G.draw.unshift(sun);
  const aiDrawn=sunReveal(3);
  if(aiDrawn.length){const keep=aiBest(aiDrawn);aiDrawn.filter(x=>x!==keep).forEach(x=>G.discard.push(x));G.ai.hand.push(keep);}
  logMsg("☀️ The Sun rises for all — the opponent keeps one; you replace one.");
  const pDrawn=sunReveal(3);render();
  if(!pDrawn.length){return setTimeout(aiPlay,400);} // you get nothing to replace; AI finishes its turn
  sunKeepModalGeneric(pDrawn,()=>sunReleaseModalGeneric(()=>setTimeout(aiPlay,300)),"The opponent drew the Sun — it shines on you too.");

// Queued Sun (surfacing during a Storm's redraw, or dealt at game start): pure replace for both, no set-lay.
function sunEvent(c){
  G.eventSpent.push(c);

  const pDrawn=sunReveal(3);
  logMsg("☀️ The Sun rises for all — reveal three, keep one, replace a card in your hand.");
  if(!pDrawn.length){const n=G.eventNext;G.eventNext=null;if(n)n();return;}
  sunKeepModalGeneric(pDrawn,()=>sunReleaseModalGeneric(()=>{const n=G.eventNext;G.eventNext=null;if(n)n();}));
}
function moonEvent(c){
  G.eventSpent.push(c);

  logMsg("🌙 The Moon rises — you and the opponent may each release up to three cards and draw as many anew.");
  moonModal();

/* ---------- LAY DOWN (terrain set / season set / both) ---------- */
/* Lay Down Set NEVER caps — it only puts things in play, open:
   - four terrains  → an open terrain set (unlocked; its Mountain, if any, is still stealable);
   - four seasons   → a season set that waits in play (a "reserve") until you Cap a set with it.
   Locking is a separate, deliberate step — the Cap Set button — always your choice. */
function layDownSet(){
  const sel=selCards();
  const terr=sel.filter(c=>c.kind==="terrain"||c.special==="Mountain");
  const seas=sel.filter(c=>c.kind==="season");
  if(terr.length===4&&seas.length===0&&evaluateSet(terr).ok){
    const chk=canAddSet(G.player,terr);if(!chk.ok){alert(chk.msg);return;}
    removeFromHand(G.player,sel);G.player.sets.push({cards:terr,seasonCards:[],locked:false,kind:evaluateSet(terr).type});
    logMsg("You laid down a terrain set: "+evaluateSet(terr).label+" — open, not yet capped.");return afterLay();
  }
  if(seas.length===4&&terr.length===0&&distinctSeasons(seas)){
    if(G.player.reserves.length>=4-G.player.sets.filter(s=>s.locked).length){alert("No more season sets — between the sets you've already locked and the ones waiting, you've got a season set for every set you can still lock (four total to win).");return;}
    G.player.reserves.push(seas);removeFromHand(G.player,sel);
    logMsg("🍂 You laid a season set into play — it waits until you Cap a terrain set with it.");return afterLay();
  }
}
/* Cap Set — the deliberate lock. Uses four seasons SELECTED in your hand, or (if none selected)
   your waiting season set (reserve), and lays them onto an uncapped terrain set to lock it forever. */
function capSet(){
  if(G.turn!=="player"||G.over||!G.drewThisTurn)return;
  const cappable=G.player.sets.filter(s=>!s.locked&&!setFogged(s));
  if(!cappable.length)return;
  const sel=selCards();const selSeas=sel.filter(c=>c.kind==="season");
  let source,fromHandSel=null,fromReserve=false;
  if(sel.length===4&&selSeas.length===4&&distinctSeasons(selSeas)){source=selSeas;fromHandSel=sel;}
  else if(G.player.reserves.length&&sel.length===0){source=G.player.reserves[0];fromReserve=true;} // any waiting season set works; use the first
  else return;
  const apply=(s)=>{
    s.seasonCards=source;s.locked=true;
    const label=evaluateSet(s.cards).label||"set";
    if(fromHandSel){removeFromHand(G.player,fromHandSel);G.sel.clear();
      logMsg("🔒 You capped the "+label+" with four seasons from your hand — locked forever!");
      if(checkWin())return;return afterLay();} // the four seasons were your play; refill to seven and end
    // capped from a waiting season set — no hand cards spent, so finish by discarding one
    G.player.reserves.shift();G.sel.clear();
    logMsg("🔒 You capped the "+label+" with a waiting season set — locked forever!");
    if(checkWin())return;render();
    document.getElementById("hint").textContent="Set locked. Discard one card to end your turn.";updateControls();
  };
  if(cappable.length===1)return apply(cappable[0]);
  capTargetModal(cappable,apply); // more than one open set — you choose which to lock
}
function capTargetModal(cappable,apply){
  const m=document.getElementById("modal");
  m.innerHTML="<h2>🔒 Cap which set?</h2><p style='max-width:450px;margin:8px auto;font-size:13px;'>Locking is forever — a Mountain inside becomes safe from stealing for good. Choose the set to seal.</p><div class='picks' id='cp' style='flex-direction:column;gap:10px;'></div>";
  cappable.forEach(s=>{
    const w=document.createElement("div");w.style.cssText="cursor:pointer;border:1px solid #b8912f;border-radius:8px;padding:6px;background:#efe6cf;";
    const hasM=s.cards.some(c=>c.special==="Mountain");
    const lbl=document.createElement("div");lbl.style.cssText="font-size:12px;margin-bottom:4px;color:#5a4a22;font-weight:bold;";
    lbl.textContent=(evaluateSet(s.cards).label||"set")+(hasM?"  ⛰️ has a Mountain (locks it forever)":"");
    const cc=document.createElement("div");cc.style.cssText="display:flex;gap:4px;justify-content:center;";
    s.cards.forEach(c=>cc.appendChild(cardEl(c,{mini:true})));
    w.appendChild(lbl);w.appendChild(cc);
    w.onclick=()=>{hideOverlay();apply(s);};
    m.querySelector("#cp").appendChild(w);
  });
  showOverlay();
}
function afterLay(){G.sel.clear();drawUpTo(G.player);flushEvents(()=>{if(checkWin())return;endTurn();});}

/* ---------- STEAL MOUNTAIN ---------- */
function stealMountain(){
  const sel=selCards();if(sel.length!==1||sel[0].kind!=="terrain")return;
  const tc=sel[0];const targets=swapTargets(tc);if(!targets.length)return;
  if(targets.length===1)return doSwap(tc,targets[0]);
  // more than one set this card could complete — let the player pick
  const m=document.getElementById("modal");
  m.innerHTML="<h2>⛰️ Complete which set?</h2><p style='max-width:400px;margin:8px auto;font-size:13px;'>Slot your "+cardName(tc)+" into a Mountain's place and take the Mountain into your hand.</p><div class='picks' id='mp'></div>";
  targets.forEach(o=>{const mtn=o.s.cards.find(c=>c.special==="Mountain"&&!c.fog);
    const e=cardEl(mtn,{});e.style.cursor="pointer";e.title=o.mine?"your set":"opponent's set";
    e.onclick=()=>{hideOverlay();doSwap(tc,o);};
    m.querySelector("#mp").appendChild(e);});
  showOverlay();
}
function doSwap(tc,o){
  const s=o.s;const m=s.cards.find(c=>c.special==="Mountain"&&!c.fog);if(!m)return;
  s.cards[s.cards.indexOf(m)]=tc;
  removeFromHand(G.player,[tc]);
  m.fog=false;G.player.hand.push(m);
  if(o.mine)logMsg("⛰️ You completed your own set with the "+cardName(tc)+" and reclaimed your Mountain — that swap was your whole turn.");
  else logMsg("⛰️ You completed the opponent's set with your "+cardName(tc)+" and STOLE their Mountain — that swap was your whole turn.");
  G.sel.clear();if(checkWin())return;render();endTurn();
}
/* ---------- SPECIALS ---------- */
function playSpecial(){const sel=selCards();if(sel.length!==1)return;const c=sel[0];
  removeFromHand(G.player,[c]);G.sel.clear();resolveSpecial(c,"player");}
function discardSelected(){const sel=selCards();if(sel.length!==1)return;const c=sel[0];
  removeFromHand(G.player,[c]);G.discard.push(c);logMsg("You discarded the "+cardName(c)+".");G.sel.clear();endTurn();}
function returnToDraw(cards){G.draw.push(...cards);shuffle(G.draw);}
/* Only the targeted family — Fog and Wind — is ever *played* from a hand.
   Storm, Sun and Moon are table events that fire on draw (see TABLE EVENTS). */
function resolveSpecial(c,owner){
  const who=owner==="player"?"You":"The opponent";
  if(c.special==="Fog"){
    if(owner==="player"){fogPlayerModal(c);return;} // player: the Fog is laid on the Mountain and IS the turn's discard (handled in the modal)
    const ts=G.player.sets.find(s=>!s.locked&&s.cards.some(x=>x.special==="Mountain"&&!x.fog));
    if(ts){const mtn=ts.cards.find(x=>x.special==="Mountain"&&!x.fog);mtn.fog=true;mtn.fogCard=c; // Fog rests ON the Mountain, not the deck or pile
      logMsg("🌫️ The opponent fogged your Mountain — that set is frozen (no steal, no cap) until Wind clears it.");}
    else {G.discard.push(c);logMsg("🌫️ The opponent played Fog, but there was no Mountain to freeze. It drifts away.");}}
  else if(c.special==="Wind"){const mine=owner==="player"?G.player.sets:G.ai.sets;
    const f=mine.flatMap(s=>s.cards).find(x=>x.fog); // clear a fog freezing YOUR OWN Mountain
    if(f){f.fog=false;if(f.fogCard){G.discard.push(f.fogCard);f.fogCard=null;} // the cleared Fog now goes to the discard pile, spent
      logMsg("🍃 "+who+" played Wind — the fog over "+(owner==="player"?"your":"its")+" Mountain lifts.");}
    else logMsg("🍃 "+who+" played Wind, but there was no fog to clear.");
    G.discard.push(c); // the spent Wind IS the discard for this turn
    if(owner==="player"){logMsg("Playing the Wind was your discard — turn over.");if(checkWin())return;render();return endTurn();}
    return; // AI's turn is ended by aiPlay after this returns
  }
  if(owner==="player"){if(checkWin())return;render();document.getElementById("hint").textContent="Special resolved. Now discard one card to end your turn.";updateControls();}
}
function moonModal(){
  const m=document.getElementById("modal");
  m.innerHTML="<h2>🌙 Moon — release, then renew</h2><p>Select up to 3 cards to discard, then draw the same number.</p><div class='picks' id='mp'></div><button class='primary' onclick='moonConfirm()'>Cycle Selected</button>";
  G.moonSel=new Set();
  G.player.hand.forEach(c=>{const e=cardEl(c,{mini:true});e.style.cursor="pointer";
    e.onclick=()=>{if(G.moonSel.has(c.id)){G.moonSel.delete(c.id);e.classList.remove("sel");}
      else if(G.moonSel.size<3){G.moonSel.add(c.id);e.classList.add("sel");}}; // highlight only tracks what's really selected (cap 3)
    m.querySelector("#mp").appendChild(e);});
  showOverlay();
}
function moonConfirm(){const ids=[...G.moonSel];
  ids.forEach(id=>{const c=G.player.hand.find(x=>x.id===id);if(c){removeFromHand(G.player,[c]);G.discard.push(c);}});
  for(let i=0;i<ids.length;i++){const x=eventDeckDraw();if(x)G.player.hand.push(x);}
  logMsg("🌙 You released "+ids.length+" and drew anew.");hideOverlay();render();
  const n=G.eventNext;G.eventNext=null;if(n)n();
}
function fogPlayerModal(fogCard){
  const cands=[];
  [...G.player.sets,...G.ai.sets].forEach(s=>{if(s.locked)return;s.cards.forEach(c=>{if(c.special==="Mountain"&&!c.fog)cands.push({m:c,mine:G.player.sets.includes(s)});});});
  // Laying the Fog IS your discard for the turn; the Fog rests ON the Mountain (not the deck, not the pile) until Wind clears it.
  const endFog=(txt)=>{logMsg(txt+" Laying the Fog was your discard — turn over.");hideOverlay();if(checkWin())return;render();endTurn();};
  const freeze=(cd)=>{cd.m.fog=true;cd.m.fogCard=fogCard;endFog("🌫️ You fogged a Mountain in "+(cd.mine?"your":"the opponent's")+" set — frozen (no steal, no cap) until Wind clears it.");};
  if(!cands.length){G.discard.push(fogCard);endFog("🌫️ You played Fog, but there was no Mountain to freeze. It drifts away.");return;} // no target: the loose Fog is spent to the pile
  if(cands.length===1){freeze(cands[0]);return;}
  const m=document.getElementById("modal");
  m.innerHTML="<h2>🌫️ Fog — choose a Mountain to freeze</h2><p style='max-width:380px;margin:8px auto;font-size:13px;'>Freezing protects it from theft — but that set can't be capped until Wind clears the fog.</p><div class='picks' id='fp'></div>";
  cands.forEach(cd=>{const e=cardEl(cd.m,{});e.style.cursor="pointer";e.title=cd.mine?"your set":"opponent's set";
    e.onclick=()=>freeze(cd);
    m.querySelector("#fp").appendChild(e);});
  showOverlay();
}
function showOverlay(centered){const o=document.getElementById("overlay");o.classList.toggle("center",!!centered);o.style.display="flex";}
function hideOverlay(){document.getElementById("overlay").style.display="none";}

/* ---------- TURN FLOW ---------- */
function endTurn(){if(checkWin())return;G.turnCount=(G.turnCount||1)+1;render();
  if(G.turn==="player"){G.turn="ai";G.drewThisTurn=false;render();setTimeout(aiTurn,700);}
  else{G.turn="player";G.drewThisTurn=false;logMsg("— Your turn —");render();}}
function checkWin(){const p=G.player.sets.filter(s=>s.locked).length,a=G.ai.sets.filter(s=>s.locked).length;
  if(p>=TARGET||a>=TARGET){G.over=true;const m=document.getElementById("modal");
    m.innerHTML="<h2>"+(p>=TARGET?"🌿 You found Harmony.":"The opponent found Harmony first.")+"</h2><p>Final: You "+p+" · Opponent "+a+"</p><button class='primary' onclick='hideOverlay();newGame()'>Play Again</button>";
    showOverlay(true);render();return true;}return false;}

/* ---------- SIMPLE AI ---------- */
function aiTurn(){if(G.over)return;
  const top=G.discard[G.discard.length-1];
  if(top&&aiWants(top)){G.ai.hand.push(G.discard.pop());logMsg("Opponent took the "+cardName(top)+" from the discard.");}
  else{const c=popDeck();if(c){
    if(c.special==="Sun"){return aiSunDraw(c);} // Sun: AI keeps the best of three then finishes via aiPlay; you replace one
    if(isImmediate(c)){logMsg("The opponent drew the "+c.special+"…");G.eventQueue.push(c);
      render();return flushEvents(()=>{render();if(checkWin())return;endTurn();});}
    G.ai.hand.push(c);logMsg("Opponent drew from the deck.");}}
  render();setTimeout(aiPlay,600);
}
/* The AI takes ONE build action per turn, then ends at seven — mirroring the one-action rule.
   Priority: cap a set → lay a set → bank a season reserve → reclaim its own Mountain →
   fog a leading opponent's Mountain → clear its own fog → plain discard. */
function aiPlay(){if(G.over)return;
  const capTarget=G.ai.sets.find(s=>!s.locked&&!setFogged(s));
  const capCards=findSeasonCap(G.ai.hand); // celestial-aware: four cards covering all seasons
  if(capTarget&&capCards){capTarget.seasonCards=capCards;capTarget.locked=true;
    capCards.forEach(c=>removeFromHand(G.ai,[c]));logMsg("🔒 Opponent capped a set with the four seasons.");if(checkWin())return;
    drawUpTo(G.ai);return flushEvents(()=>{render();endTurn();});}
  const found=findSetIn(G.ai.hand,G.ai);
  if(found&&canAddSet(G.ai,found).ok){found.forEach(c=>removeFromHand(G.ai,[c]));const set={cards:found,seasonCards:[],locked:false,kind:evaluateSet(found).type};
    if(G.ai.reserves.length){set.seasonCards=G.ai.reserves.shift();set.locked=true;logMsg("🔒 Opponent laid a set and a waiting season set locked it.");}
    else logMsg("Opponent laid down a set: "+evaluateSet(found).label+".");
    G.ai.sets.push(set);drawUpTo(G.ai);return flushEvents(()=>{render();endTurn();});}
  if(capCards&&!capTarget&&G.ai.reserves.length<4-G.ai.sets.filter(s=>s.locked).length&&G.ai.sets.length<4){capCards.forEach(c=>removeFromHand(G.ai,[c]));
    G.ai.reserves.push(capCards);logMsg("🍂 Opponent laid a season set as a reserve.");drawUpTo(G.ai);return flushEvents(()=>{render();endTurn();});}
  // Reclaim its OWN Mountain: complete one of its own sets with a real terrain card, take the wild back to reuse
  for(const s of G.ai.sets){if(s.locked)continue;const m=s.cards.find(c=>c.special==="Mountain"&&!c.fog);
    if(m){const need=G.ai.hand.find(tc=>tc.kind==="terrain"&&mountainNeeds(s,tc));
      if(need){s.cards[s.cards.indexOf(m)]=need;removeFromHand(G.ai,[need]);m.fog=false;G.ai.hand.push(m);
        logMsg("⛰️ Opponent completed its own set with a real card and reclaimed its Mountain.");return aiDiscard();}}}
  // Fog: freeze the player's vulnerable Mountain to delay them — worth doing when the player is leading.
  const fog=G.ai.hand.find(c=>c.special==="Fog");
  if(fog){const pFoggable=G.player.sets.some(s=>!s.locked&&s.cards.some(x=>x.special==="Mountain"&&!x.fog));
    const pLocked=G.player.sets.filter(s=>s.locked).length;
    if(pFoggable&&pLocked>=2){removeFromHand(G.ai,[fog]);resolveSpecial(fog,"ai");if(checkWin())return;return endTurn();}} // Fog IS the discard
  const wind=G.ai.hand.find(c=>c.special==="Wind");if(wind&&G.ai.sets.some(setFogged)){removeFromHand(G.ai,[wind]);resolveSpecial(wind,"ai");if(checkWin())return;return endTurn();} // playing Wind IS the discard — end at seven
  return aiDiscard();
}
function aiDiscard(){if(G.over)return;
  if(!G.ai.hand.length){return endTurn();} // nothing to discard (played its last card) — just end
  const worst=aiWorst(G.ai.hand,1)[0]||G.ai.hand[0];removeFromHand(G.ai,[worst]);G.discard.push(worst);logMsg("Opponent discarded.");endTurn();}
function aiMoonCycle(){const toss=aiWorst(G.ai.hand,3).filter(c=>aiValue(c)<=4);
  toss.forEach(x=>{removeFromHand(G.ai,[x]);G.discard.push(x);});
  const n=toss.length;for(let i=0;i<n;i++){const x=eventDeckDraw();if(x)G.ai.hand.push(x);} // eventDeckDraw keeps sky cards out of hand
  logMsg("🌙 Opponent released "+n+" and drew "+n+".");}
function aiWants(c){if(c.kind==="terrain")return true;if(c.celestial)return true;if(c.kind==="season")return G.ai.hand.filter(x=>x.season===c.season).length<1;if(c.special==="Mountain")return true;return false;}
function aiBest(cards){return cards.slice().sort((a,b)=>aiValue(b)-aiValue(a))[0];}
function aiWorst(hand,n){return hand.slice().sort((a,b)=>aiValue(a)-aiValue(b)).slice(0,n);}
function aiValue(c){if(c.special==="Mountain")return 9;if(c.celestial)return 7;if(c.kind==="terrain")return 6;
  if(c.kind==="season"){const dup=G.ai.hand.filter(x=>x.season===c.season).length;return dup>1?2:4;}
  if(c.special==="Storm")return 1;return 3;}

function titleScreen(){const m=document.getElementById("modal");
  m.innerHTML="<h2 style='font-size:36px;letter-spacing:5px;margin:0;'>HARMONY</h2>"
    +"<p style='font-style:italic;margin:2px 0 0;color:#6a5c3a;'>A Game of Balance</p>"
    +"<p style='max-width:400px;margin:16px auto;font-size:14px;line-height:1.55;'>A meditative game of nature, balance, and change. Complete four Harmony Sets — each a full direction or a full terrain — and cap each with the four seasons before your opponent finds the way.</p>"
    +"<button class='primary' onclick='hideOverlay();newGame();'>Start Game</button>";
  showOverlay(true);}
titleScreen();
</script>
